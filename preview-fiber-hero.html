<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Превью: hero-анимация оптоволокна</title>
<style>
  body{margin:0;background:#EFE6D2;font-family:sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;}
  .horizon-box{
    background:linear-gradient(180deg, #FBF7EC 0%, #EFE6D2 100%);
    border:1px solid #D8CCAE;
    border-radius:14px;
    padding:18px 14px 8px;
    max-width:480px;
  }
  .horizon-caption{text-align:center;font-size:.85rem;color:#56564C;margin-top:6px;}
  .fiber-pulse{stroke-dasharray:14 90;animation:fiberFlow 2.2s linear infinite;}
  @keyframes fiberFlow{ to{ stroke-dashoffset:-520; } }
  .house-glow{animation:houseGlow 2.2s ease-in-out infinite;transform-origin:center;}
  @keyframes houseGlow{ 0%,100%{opacity:.35;} 50%{opacity:1;} }
  @keyframes pulse{ 0%{opacity:.25;r:3;} 50%{opacity:1;r:6;} 100%{opacity:.25;r:3;} }
  .pulse-dot{ animation:pulse 2.6s ease-in-out infinite; transform-origin:center; }
  .pulse-dot.d2{ animation-delay:.5s; }
  .pulse-dot.d3{ animation-delay:1s; }
  .pulse-dot.d4{ animation-delay:1.5s; }
</style>
</head>
<body>
  <div class="horizon-box" aria-hidden="true">
    <svg viewBox="0 0 420 230" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#FBF7EC"/>
          <stop offset="100%" stop-color="#F1E9D6"/>
        </linearGradient>
        <linearGradient id="cableGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#154E47"/>
          <stop offset="50%" stop-color="#1F6F64"/>
          <stop offset="100%" stop-color="#154E47"/>
        </linearGradient>
        <linearGradient id="lightGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#FFE9B8" stop-opacity="0"/>
          <stop offset="50%" stop-color="#FFE9B8" stop-opacity="1"/>
          <stop offset="100%" stop-color="#FFE9B8" stop-opacity="0"/>
        </linearGradient>
        <filter id="fiberGlow" x="-60%" y="-60%" width="220%" height="220%">
          <feGaussianBlur stdDeviation="2.4" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>
      <rect x="0" y="0" width="420" height="230" fill="url(#sky)"/>
      <g stroke="#E1D6B8" stroke-width="2">
        <path d="M0,210 H420" />
        <path d="M0,218 H420" />
        <path d="M0,226 H420" />
      </g>
      <path d="M0,168 C70,150 110,180 180,160 C250,142 300,175 375,150" fill="none" stroke="url(#cableGrad)" stroke-width="4" stroke-linecap="round"/>
      <path d="M0,168 C70,150 110,180 180,160 C250,142 300,175 375,150" fill="none" stroke="url(#lightGrad)" stroke-width="4" stroke-linecap="round" class="fiber-pulse" filter="url(#fiberGlow)"/>
      <g stroke="#C98A2B" stroke-width="1.6" stroke-dasharray="4 5" opacity="0.85">
        <line x1="55" y1="120" x2="33" y2="153"/>
        <line x1="140" y1="95" x2="118" y2="156"/>
        <line x1="225" y1="118" x2="218" y2="153"/>
        <line x1="300" y1="80" x2="296" y2="151"/>
      </g>
      <g fill="#1F6F64">
        <circle class="pulse-dot d1" cx="55" cy="120" r="5"/>
        <circle class="pulse-dot d2" cx="140" cy="95" r="5"/>
        <circle class="pulse-dot d3" cx="225" cy="118" r="5"/>
        <circle class="pulse-dot d4" cx="300" cy="80" r="5"/>
      </g>
      <g fill="#56564C" font-family="sans-serif" font-size="11">
        <text x="30" y="142">Каневская</text>
        <text x="98" y="80">Стародеревянковская</text>
        <text x="190" y="140">Новоминская</text>
        <text x="278" y="65">Новодеревянковская</text>
      </g>
      <g transform="translate(375,150)">
        <circle r="15" fill="rgba(201,138,43,.16)" class="house-glow"/>
        <path d="M-8,4 V-4 L0,-11 L8,-4 V4 Z" fill="#FBF7EC" stroke="#C98A2B" stroke-width="1.6" stroke-linejoin="round"/>
        <rect x="-2.5" y="-1" width="5" height="5" fill="#C98A2B"/>
      </g>
    </svg>
    <p class="horizon-caption">Сигнал по оптоволокну распространяется со скоростью света — от узла связи до вашего дома за доли секунды</p>
  </div>
</body>
</html>
